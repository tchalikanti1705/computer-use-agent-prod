version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent_secret
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: pg_isready -U agent
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: redis-cli ping
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: [minio_data:/data]

  gateway:
    build: { context: ., dockerfile: gateway/Dockerfile }
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  control-plane:
    build: { context: ., dockerfile: control_plane/Dockerfile }
    ports: ["8001:8001"]
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  agent-worker:
    build: { context: ., dockerfile: agent_runtime/Dockerfile }
    env_file: .env
    volumes: [/var/run/docker.sock:/var/run/docker.sock]
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      replicas: 2

volumes:
  pgdata:
  minio_data:
